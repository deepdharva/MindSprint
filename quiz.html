<!DOCTYPE html>
<html>
<head>
    <title>MindSprint Quiz</title>
</head>
<body>

<h2>Answer the Questions:</h2>

<form method="POST">
    {% for q in questions %}
        <p><b>{{ q.question }}</b></p>

        {% for option in q.options %}
            <input type="radio"
                   name="q{{ loop.parent.index0 }}"
                   value="{{ option }}" required>
            {{ option }} <br>
        {% endfor %}

        <br>
    {% endfor %}

    <button type="submit">Submit</button>
</form>

</body>
</html>
